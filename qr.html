<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sakura and Tyreq's Trivia QR Code</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ff69b4,#000);
    font-family:Arial, sans-serif;
    color:white;
}

.card{
    text-align:center;
    background:rgba(0,0,0,0.85);
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(255,105,180,0.5);
}

h1{
    color:#ff69b4;
    margin-bottom:10px;
}

p{
    margin-bottom:20px;
    color:#ffc0cb;
}

img{
    border-radius:15px;
    border:4px solid #ff69b4;
}
</style>
</head>

<body>

<div class="card">
    <h1>🍼 Sakura and Tyreq's Trivia 🍼</h1>
    <p>Scan to play the baby shower trivia!</p>

    <!-- QR CODE IMAGE -->
    <img 
        src="https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=https://fp5vtv7wvm-max.github.io/Babyshower/"
        alt="QR Code"
    >

</div>

</body>
</html>
